<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 150" width="100%">
  <g>
    <animateTransform 
      attributeName="transform" 
      type="translate" 
      from="-150 25" 
      to="1100 25" 
      dur="12s" 
      repeatCount="indefinite"
    />
    
    <g>
      <animateTransform 
        attributeName="transform" 
        type="rotate" 
        values="-25 50 100; 25 50 100; -25 50 100" 
        dur="3s" 
        repeatCount="indefinite" 
      />
      
      </g>
  </g>
</svg>
